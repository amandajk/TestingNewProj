<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TestingNewProj</title>
    <base href="/" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="TestingNewProj.styles.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300%3B400%3B500%3B600%3B700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css" />
    <style>
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes loadingBar {
            0% {
                width: 0%;
                margin-left: 0;
            }

            50% {
                width: 100%;
                margin-left: 0;
            }

            100% {
                width: 0%;
                margin-left: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="blazor-loading" style="
            position: fixed;
            inset: 0;
            background-color: #faf7f2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            font-family: 'Space Grotesk', sans-serif;
            z-index: 9999;
        ">
            <div style="
                font-size: 2rem;
                color: #7c6355;
                font-weight: 800;
                letter-spacing: 0.08em;
                animation: fadeSlideIn 0.9s ease forwards;
                opacity: 0;
            ">urlgrey</div>
            <div style="
                font-size: 0.85rem;
                color: #b5a99a;
                font-weight: 800;
                letter-spacing: 0.15em;
                animation: fadeSlideIn 0.9s ease 0.3s forwards;
                opacity: 0;
            ">Baked with love</div>
            <div style="
                width: 160px;
                height: 2px;
                background-color: #f2e0d9;
                border-radius: 2px;
                overflow: hidden;
                margin-top: 0.5rem;
            ">
                <div style="
                    height: 100%;
                    background-color: #7c6355;
                    border-radius: 2px;
                    animation: loadingBar 1.8s ease-in-out infinite;
                "></div>
            </div>
        </div>
    </div>
    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="js/animations.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
